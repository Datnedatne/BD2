<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎁 QR Codes — Quà Sinh Nhật Thảo</title>
  <link rel="stylesheet" href="./fonts.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #0f0520;
      color: #fff;
      min-height: 100vh;
      padding: 40px 20px 60px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      text-align: center;
      color: #FFD6E0;
      margin-bottom: 6px;
    }

    .subtitle {
      text-align: center;
      font-size: 13px;
      color: rgba(255,200,220,0.5);
      margin-bottom: 40px;
      font-family: 'Space Mono', monospace;
      letter-spacing: 2px;
    }

    .qr-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 28px;
      justify-content: center;
      max-width: 960px;
      margin: 0 auto;
    }

    .qr-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,143,171,0.25);
      border-radius: 22px;
      padding: 28px 24px 22px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      width: 220px;
      backdrop-filter: blur(8px);
      transition: transform 0.2s ease, box-shadow 0.3s ease;
    }

    .qr-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 40px rgba(255,100,150,0.15);
    }

    .qr-emoji { font-size: 32px; }

    /* QR image — white bg padding để camera nhận rõ hơn */
    .qr-img-wrap {
      background: #fff;
      border-radius: 10px;
      padding: 10px;
      display: inline-block;
      line-height: 0;
    }

    .qr-img-wrap img {
      display: block;
      width: 200px;
      height: 200px;
      border-radius: 4px;
    }

    .qr-title {
      font-family: 'Playfair Display', serif;
      font-size: 15px;
      text-align: center;
      color: #FFD6E0;
      line-height: 1.5;
      white-space: pre-line;
    }

    .qr-url {
      font-family: 'Space Mono', monospace;
      font-size: 8px;
      color: rgba(255,200,220,0.3);
      text-align: center;
      word-break: break-all;
    }

    .print-btn {
      display: block;
      margin: 36px auto 0;
      background: linear-gradient(135deg, #FF8FAB, #E8637A);
      color: white;
      border: none;
      border-radius: 50px;
      padding: 14px 40px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 6px 24px rgba(232,99,122,0.4);
      transition: transform 0.2s, box-shadow 0.3s;
    }

    .print-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 32px rgba(232,99,122,0.55);
    }

    .notice {
      text-align: center;
      font-size: 12px;
      color: rgba(255,200,220,0.45);
      margin-top: 24px;
      line-height: 1.9;
    }

    .notice code {
      background: rgba(255,143,171,0.12);
      border-radius: 4px;
      padding: 1px 5px;
      font-family: 'Space Mono', monospace;
      color: rgba(255,200,220,0.7);
    }

    /* ── PRINT STYLES ── */
    @media print {
      body {
        background: white;
        color: #000;
        padding: 10px;
      }
      .print-btn, .notice, .subtitle { display: none; }
      .qr-card {
        border: 1px solid #ddd;
        page-break-inside: avoid;
        background: white;
        backdrop-filter: none;
      }
      .qr-title { color: #333; }
      .qr-url   { color: #aaa; }
      h1        { color: #333; }
    }
  </style>
</head>
<body>

  <h1>🎁 QR Quà Sinh Nhật — Thảo</h1>
  <p class="subtitle">IN RA VÀ CẮT THÀNH 4 TẤM CARD NHÉ 🌸</p>

  <div class="qr-grid" id="qr-grid"></div>

  <button class="print-btn" onclick="window.print()">🖨️ In QR Codes</button>

  <p class="notice">
    ✅ QR trỏ thẳng vào <code>datnedatne.github.io/BD2/birthday_thao.html</code><br>
    📱 Quét bằng camera điện thoại — không cần app đặc biệt
  </p>

  <script>
    // ── URL gốc trên GitHub Pages ──────────────────────────────
    const BASE_URL = 'https://datnedatne.github.io/BD2/birthday_thao.html';

    const GIFTS = [
      { num: 1, token: 'vutru22',   emoji: '🌌', title: 'Quà 1\nVũ trụ của Em'    },
      { num: 2, token: 'vuonhoa22', emoji: '🌸', title: 'Quà 2\nVườn hoa tình yêu'},
      { num: 3, token: 'bimo22',    emoji: '🎀', title: 'Quà 3\n(Sắp có)'          },
      { num: 4, token: 'finale22',  emoji: '✨', title: 'Quà 4\n(Sắp có)'          },
    ];

    const grid = document.getElementById('qr-grid');

    GIFTS.forEach(g => {
      const url = `${BASE_URL}?gift=${g.num}&t=${g.token}`;

      // Dùng qrserver.com API — chỉ là <img>, không cần JS library
      // Đen trắng thuần, viền trắng dày -> camera dễ đọc nhất
      const qrApiUrl = `https://api.qrserver.com/v1/create-qr-code/?`
        + `size=200x200`
        + `&data=${encodeURIComponent(url)}`
        + `&color=000000`
        + `&bgcolor=ffffff`
        + `&margin=2`
        + `&ecc=M`;      // Error correction M — cân bằng mật độ

      const card = document.createElement('div');
      card.className = 'qr-card';
      card.innerHTML = `
        <div class="qr-emoji">${g.emoji}</div>
        <div class="qr-img-wrap">
          <img src="${qrApiUrl}" alt="QR ${g.title}" loading="lazy">
        </div>
        <p class="qr-title">${g.title}</p>
        <p class="qr-url">${url}</p>
      `;

      grid.appendChild(card);
    });
  </script>

</body>
</html>
